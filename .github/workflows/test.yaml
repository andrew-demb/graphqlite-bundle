name: test
on:
    pull_request: ~
    push:
        branches:
            - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
    test:
        runs-on: ubuntu-latest
        name: test
        strategy:
            matrix:
                install-args: ['']
                php-version: ['8.2', '8.3', '8.4']
            fail-fast: false
        steps:
            - name: checkout
              uses: actions/checkout@v6

            - name: php
              uses: shivammathur/setup-php@2.36.0
              with:
                  php-version: ${{ matrix.php-version }}
                  ini-values: zend.assertions=1

            - name: composer-cache-dir
              id: composercache
              run: |
                  echo "::set-output name=dir::$(composer config cache-files-dir)"

            - name: composer-cache
              uses: actions/cache@v5.0.5
              with:
                  path: ${{ steps.composercache.outputs.dir }}
                  key: composer-${{ hashFiles('**/composer.json') }}-${{ matrix.install-args }}
                  restore-keys: |
                      composer-${{ hashFiles('**/composer.json') }}-${{ matrix.install-args }}
                      composer-${{ hashFiles('**/composer.json') }}-
                      composer-

            - name: composer
              run: |
                  composer update ${{ matrix.install-args }} --no-interaction --no-progress --prefer-dist

            - name: phpunit
              run: |
                  vendor/bin/simple-phpunit --no-coverage

    static-analysis:
        runs-on: ubuntu-latest
        name: static-analysis
        steps:
            - name: checkout
              uses: actions/checkout@v6

            - name: php
              uses: shivammathur/setup-php@2.36.0
              with:
                  php-version: '8.4'
                  ini-values: zend.assertions=1

            - name: composer-cache-dir
              id: composercache
              run: |
                  echo "::set-output name=dir::$(composer config cache-files-dir)"

            - name: composer-cache
              uses: actions/cache@v5.0.5
              with:
                  path: ${{ steps.composercache.outputs.dir }}
                  key: composer-${{ hashFiles('**/composer.json') }}
                  restore-keys: |
                      composer-${{ hashFiles('**/composer.json') }}
                      composer-

            - name: composer
              run: |
                  composer update --no-interaction --no-progress --prefer-dist

            - name: phpstan-cache
              uses: actions/cache@v5.0.5
              with:
                  key: phpstan-${{ github.ref }}-${{ github.sha }}
                  path: .phpstan-cache
                  restore-keys: |
                      phpstan-${{ github.ref }}-
                      phpstan-

            - name: phpstan
              run: |
                  mkdir -p .phpstan-cache
                  vendor/bin/phpstan analyse --no-progress --no-interaction --memory-limit=1G
